<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="stylesheet"
      href="./style.css"
    />
    <title>
      PIÕES DO PAMPA -
      Conversor Monetário
    </title>
  </head>
  <body>
    <header>
      <h1>PIÕES DO PAMPA</h1>
      <p>Data: 31/03/2026</p>
    </header>
    <section id="corpo">
      <section
        class="converter"
      >
        <label for="quantia"
          >Quantia:</label
        >
        <input
          type="number"
          id="quantia"
          placeholder="Digite o valor"
        />

        <label
          for="moedaOrigem"
          >Converter
          de:</label
        >
        <select
          id="moedaOrigem"
        >
          <option value="BRL">
            BRL - Real
          </option>
          <option value="USD">
            USD - Dólar
          </option>
        </select>

        <label
          for="moedaDestino"
          >Para:</label
        >
        <select
          id="moedaDestino"
        >
          <option value="USD">
            USD - Dólar
          </option>
          <option value="EUR">
            EUR - Euro
          </option>
        </select>

        <button>
          Converter
        </button>

        <div
          class="resultado"
        >
          Resultado:
        </div>
      </section>

      <section
        class="grafico"
      >
        [Gráfico em tempo real
        das moedas]
      </section>
    </section>
  </body>
</html>
